services:

  dev:
    image: python:3.11
    working_dir: /workspace
    volumes:
      - .:/workspace
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16
    container_name: apiforge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apiforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apiforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  apiforge:
    build:
      context: ./services/apiforge
    ports:
      - "8000:8000"
    volumes:
      - ./services/apiforge:/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/apiforge
      JWT_SECRET: super-secret-key

  kong:
    image: kong:3.8
    container_name: apiforge-kong

    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001

    ports:
      - "8080:8000"
      - "8001:8001"

    volumes:
      - ./services/kong/kong.yml:/kong/kong.yml

    depends_on:
      - apiforge

volumes:
  postgres_data: